name: Deploy docs to GitHub Pages

# Builds the MkDocs site and publishes it to GitHub Pages (free for this PUBLIC repo). This repo
# contains ONLY the user-facing docs - never the plugin source, tests, or internal planning - so
# nothing internal can leak into the published site.
on:
  push:
    branches: [main]
  # Build (but don't deploy) on PRs so the site is validated before merge — this is
  # the status check that gates Dependabot auto-merge.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Fail if any English content page has no German (*.de.md) sibling. Catches "added an EN
      # page, forgot the DE one" - the one drift a build can detect (content-level translation
      # freshness is still a human review).
      - name: Check every page has a German translation
        run: |
          missing=0
          while IFS= read -r f; do
            case "$f" in *.de.md) continue;; esac
            de="${f%.md}.de.md"
            if [ ! -f "$de" ]; then
              echo "::error file=$f::Missing German translation: expected $de"
              missing=1
            fi
          done < <(find docs -name '*.md')
          if [ "$missing" -ne 0 ]; then
            echo "One or more pages are missing a *.de.md translation (see errors above)."
            exit 1
          fi
          echo "All pages have a German translation."
      - uses: actions/setup-python@v6
        with:
          # Pinned to a specific minor (no floating '3.x'); Dependabot's github-actions +
          # pip updates keep the toolchain and requirements current.
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    # Deploy only on push to main / manual runs — never from a PR build.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
