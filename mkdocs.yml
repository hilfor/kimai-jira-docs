site_name: Kimai Jira Sync
site_description: Documentation for the JiraBundle Kimai plugin — Jira worklog sync, import, routing, and custom fields.
site_author: hilfor
# GitHub Pages serves this project site under the /kimai-jira-docs/ subpath. Without site_url the
# language switcher generates root-absolute links (/de/ -> hilfor.github.io/de -> 404); with it,
# links correctly include the subpath (/kimai-jira-docs/de/).
site_url: https://hilfor.github.io/kimai-jira-docs/

theme:
  name: material
  icon:
    logo: material/sync
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    # navigation.instant is intentionally omitted — it breaks the i18n language switcher's
    # contextual (same-page) links between the English and German versions.
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Worklog sync (Kimai → Jira): features/worklog-sync.md
  - Importing (Jira → Kimai): features/importing.md
  - Per-project routing: features/project-routing.md
  - Opt-in auto-create: features/auto-create.md
  - Custom-field passthrough: features/custom-fields.md
  - Notifications & visibility: features/notifications.md
  - Troubleshooting: features/troubleshooting.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

# English + German, with a language switcher in the header. German pages are the *.de.md siblings
# (docs_structure: suffix); reconfigure_material wires up Material's built-in language selector.
plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Start
            "Worklog sync (Kimai → Jira)": "Worklog-Sync (Kimai → Jira)"
            "Importing (Jira → Kimai)": "Import (Jira → Kimai)"
            Per-project routing: Projektbezogenes Routing
            Opt-in auto-create: Automatisches Anlegen (Opt-in)
            Custom-field passthrough: Benutzerfeld-Übernahme
            "Notifications & visibility": "Benachrichtigungen & Sichtbarkeit"
            Troubleshooting: Fehlerbehebung

# Only the docs/ tree is built into the site — no plugin source, tests, or internal planning is
# present in this repository at all (see README).
